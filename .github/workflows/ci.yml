name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Run the required checks on merge-queue branches (gh-readonly-queue/…) so the
  # queue can gate on the combined-with-main state. All jobs run on merge_group:
  # both required contexts — "Validate (no e2e)" and "e2e gate" (via its needs) —
  # must report on the queue branch. See docs/ci-merge-queue.md.
  merge_group:

jobs:
  validate-no-e2e:
    name: Validate (no e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: jaunder-org
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push build products to the cache, but NOT the test-result check
          # derivations (jaunder-coverage / jaunder-e2e): CI must always re-run
          # the tests and never trust a cached green check (flaky-pass / impurity
          # protection).
          pushFilter: "jaunder-coverage|jaunder-e2e"
      # xtask is host-only, so cachix can't cover it; cache its compiled deps
      # between runs.
      - name: Cache xtask host build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xtask/target
          key: xtask-${{ runner.os }}-${{ hashFiles('xtask/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            xtask-${{ runner.os }}-
      - name: Validate (static + clippy + coverage, via xtask)
        run: nix develop .#ci --accept-flake-config -c cargo xtask validate --no-e2e
      # Drift guard for the Nix coverage `src` filter (#241/#37): eval-only, so it
      # reuses this job's nix + cachix + xtask cache for ~seconds. `if: always()` so a
      # filter-drift signal is not masked by an unrelated `validate` failure.
      - name: Coverage source-drift probe (#241)
        if: always()
        run: nix develop .#ci --accept-flake-config -c cargo xtask coverage probe-source
      - name: Upload coverage diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validate-diagnostics
          path: |
            .xtask/diagnostics/
            .xtask/gcroots/coverage/status.json
            .xtask/gcroots/coverage/diagnostics/
            .xtask/last-result.json
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: e2e (${{ matrix.backend }}/${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgres]
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: jaunder-org
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push build products to the cache, but NOT the test-result check
          # derivations (jaunder-coverage / jaunder-e2e): CI must always re-run
          # the tests and never trust a cached green check (flaky-pass / impurity
          # protection).
          pushFilter: "jaunder-coverage|jaunder-e2e"
      # xtask is host-only, so cachix can't cover it; cache its compiled deps
      # between runs.
      - name: Cache xtask host build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xtask/target
          key: xtask-${{ runner.os }}-${{ hashFiles('xtask/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            xtask-${{ runner.os }}-
      - name: e2e (${{ matrix.backend }}/${{ matrix.browser }}, via xtask)
        # xtask surfaces retried-but-passed tests itself: it reads the report it
        # lifts out of the VM, appends a table to $GITHUB_STEP_SUMMARY (inherited
        # env), records them in the sidecar, and prints a `flaky:` sentinel. See
        # xtask/src/steps/flaky.rs.
        run: nix develop .#ci --accept-flake-config -c cargo xtask e2e ${{ matrix.backend }} ${{ matrix.browser }}
      - name: Upload e2e diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ matrix.backend }}-${{ matrix.browser }}
          path: |
            .xtask/diagnostics/
            .xtask/last-result.json
          if-no-files-found: ignore
          retention-days: 14

  elisp-integration:
    name: elisp-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        with:
          name: jaunder-org
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Same rationale as the e2e jobs: never substitute a cached green for a
          # VM test result (the `jaunder-e2e*` derivations are push-excluded).
          pushFilter: "jaunder-coverage|jaunder-e2e"
      - name: Cache xtask host build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xtask/target
          key: xtask-${{ runner.os }}-${{ hashFiles('xtask/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            xtask-${{ runner.os }}-
      - name: elisp-integration (live server, via xtask)
        run: nix develop .#ci --accept-flake-config -c cargo xtask elisp-integration
      - name: Upload elisp-integration diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-elisp-integration
          path: |
            .xtask/diagnostics/
            .xtask/last-result.json
          if-no-files-found: ignore
          retention-days: 14

  e2e-gate:
    name: e2e gate
    runs-on: ubuntu-latest
    needs: [e2e, elisp-integration]
    if: always()
    steps:
      - name: Require all e2e matrix + elisp-integration jobs to pass
        run: |
          e2e="${{ needs.e2e.result }}"
          elisp="${{ needs.elisp-integration.result }}"
          echo "e2e matrix result: $e2e; elisp-integration result: $elisp"
          test "$e2e" = "success" && test "$elisp" = "success"
