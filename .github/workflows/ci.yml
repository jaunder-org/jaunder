name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: jaunder-org
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Push BUILD products (deps closure etc.) but NOT the test-result
          # check derivations — so CI always re-runs the tests and never trusts
          # a cached green checkmark (flaky-pass / impurity protection).
          pushFilter: "jaunder-coverage|jaunder-e2e"

      - name: Validate (static + clippy + coverage + e2e, via xtask)
        run: nix develop --accept-flake-config -c cargo xtask validate
