name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: jaunder-org
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting
        run: |
          nix build --accept-flake-config .#checks.x86_64-linux.leptosfmt-check
          nix build --accept-flake-config .#checks.x86_64-linux.rustfmt
          nix build --accept-flake-config .#checks.x86_64-linux.prettier-check

      - name: Lint
        run: nix build --accept-flake-config .#checks.x86_64-linux.clippy

      - name: Test
        run: nix build --accept-flake-config .#checks.x86_64-linux.nextest

      - name: Dependency audit
        run: nix build --accept-flake-config .#checks.x86_64-linux.deny
